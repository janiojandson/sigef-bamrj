{% extends 'base.html' %}
{% block content %}

<div style="display: flex; justify-content: center; align-items: center; min-height: 65vh;">
    <div class="card" style="width: 100%; max-width: 450px; text-align: center; border-top: 5px solid #ffcc00; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px;">
        
        <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
        
        <h2 style="color: #002244; margin-top: 0; margin-bottom: 10px;">Bem-vindo(a), {{ user_name }}!</h2>
        
        <p style="color: #666; font-size: 0.95em; margin-bottom: 25px; line-height: 1.5;">
            Para garantir a segurança das operações, é obrigatório criar uma <strong>senha pessoal e intransferível</strong> no seu primeiro acesso.
        </p>
        
        {% if error %}
            <div style="color: #721c24; background: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb; font-size: 0.9em; text-align: left;">
                <b>⚠️ Erro:</b> {{ error }}
            </div>
        {% endif %}
        
        <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="password" name="new_password" placeholder="Digite sua Nova Senha" required 
                   style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; width: 100%; box-sizing: border-box;">
            
            <input type="password" name="confirm_password" placeholder="Confirme sua Nova Senha" required 
                   style="padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; width: 100%; box-sizing: border-box;">
            
            <button type="submit" 
                    style="padding: 14px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: background 0.3s; margin-top: 10px;">
                Salvar Senha e Entrar 🚀
            </button>
        </form>
    </div>
</div>

{% endblock %}
