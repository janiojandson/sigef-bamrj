{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-top: 5px solid #002244;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <img src="{{ url_for('static', filename='img/brasao_bamrj.png') }}" alt="Brasão BAMRJ" style="height: 90px; margin-bottom: 10px;">
        <h2 style="color: #002244; margin: 0; font-size: 1.6em;">Assinador-BAMRJ</h2>
        <small style="color: #666; font-weight: bold; font-size: 0.9em;">DIVISÃO DE FINANÇAS</small>
    </div>

    <form action="{{ url_for('main.login') }}" method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #002244;">Usuário:</label>
            <input type="text" name="username" required placeholder="Digite seu login"
                   style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #002244;">Senha:</label>
            <input type="password" name="password" required placeholder="Digite sua senha"
                   style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <button type="submit" 
                style="width: 100%; padding: 12px; background: #002244; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: background 0.3s;">
            Entrar no Sistema
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee;">
        <p style="font-size: 0.8em; color: #888; margin: 0;">
            Acesso restrito a militares e servidores autorizados.
        </p>
    </div>
</div>
{% endblock %}
